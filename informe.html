    <script>
        // Configuración Firebase igual que en MentesBrillantes.html
        var firebaseConfig = {
          apiKey: "AIzaSyCSJvvvyiY9-419R1gETR6lopy2P1vQbkY",
          authDomain: "despertando-ideas.firebaseapp.com",
          databaseURL: "https://despertando-ideas-default-rtdb.firebaseio.com",

          measurementId: "G-ZCFT4Z84TE"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        function mostrarStatusUpload(mensaje, bueno) {
            const statusEl = document.getElementById('uploadStatus');
            if (statusEl) {
                statusEl.textContent = mensaje;
                statusEl.style.color = bueno ? '#0f766e' : '#b91c1c';
            }
        }

        function normalizeKey(label) {
            return label.toString().trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        }

        function cargarExcelAFirebase(file) {
            if (!file) {
                mostrarStatusUpload('Selecciona un archivo primero', false);
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

                    if (!rows.length) {
                        mostrarStatusUpload('El archivo no contiene filas', false);
                        return;
                    }

                    const updates = [];
                    rows.forEach((row, index) => {
                        const raw = {};
                        Object.entries(row).forEach(([key, value]) => {
                            raw[normalizeKey(key)] = value;
                        });

                        if (index === 0) {
                            console.log('Primer row raw', row);
                            console.log('Primer row raw normalizado', raw);
                        }

                        // Mapeo directo con la estructura de tu Excel
                        const value = (keys, fallback='') => {
                            for (const k of keys) {
                                if (row[k] !== undefined && row[k] !== null && row[k] !== '') return row[k];
                            }
                            return fallback;
                        };

                        const parsedKey = value(['Idea N°', 'Idea N', 'IDEA N°', 'IDEA N', 'consecutivo', 'CONSECUTIVO'], '').toString().trim();
                        let ideaKey = parsedKey ? parsedKey.padStart(5, '0') : '';
                        if (!ideaKey) ideaKey = String(index + 1).padStart(5, '0');
                        if (index < 5) console.log('fila', index, 'ideaKey', ideaKey, 'rawKey', parsedKey);

                        const item = {
                            consecutivo: ideaKey,
                            nombre_idea: value(['Nombre de la idea', 'nombre de la idea', 'nombre_idea', 'Nombre Idea'], ''),
                            nombre: value(['Nombres y apellidos', 'Nombres y Apellidos', 'nombres y apellidos', 'nombre', 'nombre_completo', 'name', 'Name'], ''),
                            documento: value(['Numero de documento', 'numero de documento', 'documento'], ''),
                            telefono: value(['Celular', 'celular', 'telefono'], ''),
                            area: value(['Area', 'area', 'Área'], ''),
                            situacion: value(['Situacion actual', 'Situación actual', 'situacion_actual', 'situacion'], ''),
                            propuesta: value(['Propuesta', 'propuesta'], ''),
                            justificacion: value(['Justificacion', 'Justificación', 'justificacion'], ''),
                            correo: value(['Correo electronico', 'Correo electrónico', 'correo', 'email'], ''),
                            tipo_mejora: value(['Tipo de mejora', 'tipo de mejora', 'tipo_mejora'], ''),
                            tipo_idea: value(['Tipo de idea', 'tipo de idea', 'tipo_idea'], ''),
                            estado: value(['Estado', 'estado'], ''),
                            comentarios_lean: value(['Comentarios Lean', 'comentarios lean', 'comentarios_lean'], ''),
                            idea_en_desarrollo: value(['Idea en desarrollo', 'idea en desarrollo', 'idea_en_desarrollo'], ''),
                            premiacion: value(['Premiación', 'Premiacion', 'premiacion'], ''),
                            responsable_tarea: value(['Responsable tarea', 'responsable tarea', 'responsable_tarea'], ''),
                            fecha_registro: parseDateValue(value(['Fecha de registro', 'fecha de registro', 'Fecha De Registro', 'FECHA DE REGISTRO', 'fecha_registro', 'fecha_de_registro', 'fecha'], '')),
                            fecha_revision: value(['Fecha revision', 'Fecha revisión', 'fecha_revision'], ''),
                            fecha_fin: value(['Fecha fin', 'fecha_fin'], '')
                        };

                        const keyForNode = item.consecutivo.toString().trim();
                        updates.push({ item, ideaKey: keyForNode });
                    });

const promises = [];
                    updates.forEach(({ item, ideaKey }) => {
                        if (!ideaKey) return; // ignorar filas sin Idea N° válido
                        console.log('Guardar nodo encuestas/' + ideaKey, item);
                        const p = db.ref('encuestas/' + ideaKey).set(item);
                        promises.push(p);
                    });

                    Promise.all(promises)
                        .then(() => {
                            mostrarStatusUpload('Datos cargados correctamente', true);
                            // refrescar vista (opcional)
                            db.ref('encuestas').once('value', function(snapshot) {
                                const datos = snapshot.val() || {};
                                const encuestas = mapearEncuestasDesdeFirebase(datos);
                                window.encuestasCache = encuestas;
                                renderResumen(encuestas);
                                renderIdeas(encuestas);
                                renderAvance(encuestas);
                                renderStatus(encuestas);
                            });
                        })
                       .catch(err => mostrarStatusUpload('Error carga: ' + err.message, false));

                } catch (err) {
                    mostrarStatusUpload('Error al leer Excel: ' + err.message, false);
                }
            };
            reader.onerror = (err) => {
                mostrarStatusUpload('Error lecturas de archivo', false);
            };
            reader.readAsArrayBuffer(file);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('excelUpload');
            const uploadBtn = document.getElementById('uploadExcelBtn');
            if (uploadBtn && fileInput) {
                uploadBtn.addEventListener('click', () => {
                    const file = fileInput.files[0];
                    cargarExcelAFirebase(file);
                });
            }
        });

        function exportInformeExcel() {
            const data = window.encuestasCache || [];
            if (!data.length) {
                alert('No hay datos para exportar');
                return;
            }
            const rows = data.map(r => ({
                'Idea N°': r.consecutivo || '',
                'Nombre de la idea': r.nombre_idea || '',
                'Nombres y apellidos': r.nombre || '',
                'Número de documento': r.documento || '',
                'Celular': r.telefono || '',
                'Área': r.area || '',
                'Situación actual': r.situacion || '',
                'Propuesta': r.propuesta || '',
                'Justificación': r.justificacion || '',
                'Correo electrónico': r.correo || '',
                'Tipo de mejora': r.tipo_mejora || '',
                'Tipo de idea': r.tipo_idea || '',
                'Estado': r.estado || '',
                'Comentarios Lean': r.comentarios_lean || '',
                'Idea en desarrollo': r.idea_en_desarrollo || '',
                'Premiación': r.premiacion || '',
                'Responsable tarea': r.responsable_tarea || '',
                'Fecha revisión': r.fecha_revision || '',
                'Fecha fin': r.fecha_fin || ''
            }));
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(rows);
            XLSX.utils.book_append_sheet(wb, ws, 'Informe');
            XLSX.writeFile(wb, 'Informe_Encuestas_' + new Date().toISOString().slice(0,10) + '.xlsx');
        }

        const procesos = ['Maquillajes','Emulsiones','Hidroalcoholes','Almacén','Cendis','Mantenimiento','Calidad','LEAN','TTCA','Otro'];
        const tiposIdea = ['Mejora de proceso','Clima laboral','Ahorro de costos','Seguridad y SST','Calidad','Innovación','Sin clasificar'];
        const statusList = ['Cerrado','Pendiente','En consulta de viabilidad','En desarrollo','Viable','No viable','Proyecto de Lean'];
        const statusEquivalencias = {
            'CERRADO': 'Cerrado',

        const tipoIdeaEquivalencias = {

            'SEGURIDAD Y SST': 'Seguridad y SST',

        };
        const tipoMejoraEquivalencias = {

        function escapeHtml(valor) {
            if (valor === null || valor === undefined) return '';
            return String(valor)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function truncarTexto(texto, limite = 40) {
            const base = (texto || 'Idea sin nombre').trim();
            return base.length > limite ? base.slice(0, limite - 1) + '…' : base;
        }

        function mostrarInfoCard(titulo, valor, descripcion) {
            let toast = document.getElementById('card-info-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'card-info-toast';
                toast.style.position = 'fixed';
                toast.style.bottom = '20px';
                toast.style.right = '20px';
                toast.style.padding = '14px 18px';
                toast.style.background = 'rgba(30, 58, 138, 0.93)';
                toast.style.color = '#fff';
                toast.style.borderRadius = '12px';
                toast.style.boxShadow = '0 8px 20px rgba(0,0,0,0.25)';
                toast.style.fontSize = '0.96rem';
                toast.style.fontWeight = '600';
                toast.style.maxWidth = '320px';
                toast.style.zIndex = '10000';
                toast.style.lineHeight = '1.35';
                document.body.appendChild(toast);
            }
            toast.innerHTML = `<strong>${escapeHtml(titulo)}:</strong> ${escapeHtml(valor)}<br><small>${escapeHtml(descripcion)}</small>`;
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 3800);
        }

        function obtenerIdeasPorCategoria(categoria) {
            const encuestas = window.encuestasCache || [];
            if (!encuestas.length) return [];
            let filtrado = [];
            if (categoria === 'total') {
                filtrado = encuestas;
            } else if (categoria === 'en_desarrollo') {
                filtrado = encuestas.filter(e => {
                    const estado = normalizarStatus(e.estado || e.estatus || e.Estado || e.Estatus || '');
                    const avance = normalizarIdeaDesarrollo(e.idea_en_desarrollo || e.ideaEnDesarrollo || '');
                    return estado === 'En desarrollo' || avance === 'EN DESARROLLO';
                });
            } else if (categoria === 'pendiente') {
                filtrado = encuestas.filter(e => normalizarStatus(e.estado || e.estatus || e.Estado || e.Estatus || '') === 'Pendiente');
            } else if (categoria === 'premiada') {
                filtrado = encuestas.filter(e => normalizarPremiacion(e.premiacion || e.Premio || e.premio || '') === 'PREMIADA');
            } else if (categoria === 'pendiente_premiacion') {
                filtrado = encuestas.filter(e => normalizarPremiacion(e.premiacion || e.Premio || e.premio || '') === 'PENDIENTE');
            }
            return filtrado.map(e => ({
                consecutivo: e.consecutivo || e.key || 'N/A',
                nombre: e.nombre_idea || e.nombre || 'sin nombre'
            })).sort((a,b)=>a.consecutivo.localeCompare(b.consecutivo));
        }

        function mostrarDetalleIdeas(categoria) {
            const datos = obtenerIdeasPorCategoria(categoria);
            const modalId = 'detalle-ideas-modal';
            let modal = document.getElementById(modalId);
            if (!modal) {
                modal = document.createElement('div');
                modal.id = modalId;
                modal.style.position = 'fixed';
                modal.style.top = '0';
                modal.style.left = '0';
                modal.style.right = '0';
                modal.style.bottom = '0';
                modal.style.background = 'rgba(15, 23, 42, 0.65)';
                modal.style.zIndex = '10001';
                modal.style.display = 'flex';
                modal.style.alignItems = 'center';
                modal.style.justifyContent = 'center';
                modal.innerHTML = `
                    <div id="detalle-ideas-card" style="width:90%; max-width:640px; max-height:78vh; overflow:auto; background:#fff; border-radius:14px; padding:18px; box-shadow:0 12px 30px rgba(15,23,42,0.28); position:relative;">
                        <button id="detalle-ideas-close" style="position:absolute; top:12px; right:14px; background:#ef4444; border:none; color:#fff; border-radius:8px; cursor:pointer; padding:6px 10px; font-weight:700;">Cerrar</button>
                        <h3 id="detalle-ideas-title" style="margin-top:0; color:#1e3a8a;"></h3>
                        <p id="detalle-ideas-subtitle" style="color:#475569; margin:4px 0 12px 0;"></p>
                        <ul id="detalle-ideas-list" style="padding-left:18px; margin:0; max-height:60vh; overflow:auto;">
                        </ul>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.querySelector('#detalle-ideas-close').onclick = () => { modal.style.display = 'none'; };
                modal.onclick = (event) => {
                    if (event.target === modal) modal.style.display = 'none';
                };
            }
            const title = modal.querySelector('#detalle-ideas-title');
            const subtitle = modal.querySelector('#detalle-ideas-subtitle');
            const list = modal.querySelector('#detalle-ideas-list');
            let label = '';
            if (categoria === 'total') label = 'Todas las ideas';
            if (categoria === 'en_desarrollo') label = 'Ideas en desarrollo';
            if (categoria === 'pendiente') label = 'Ideas pendientes';
            if (categoria === 'premiada') label = 'Ideas premiadas';
            if (categoria === 'pendiente_premiacion') label = 'Ideas con premiación pendiente';
            title.textContent = label;
            subtitle.textContent = `${datos.length} idea(s) encontradas`;            
            list.innerHTML = datos.length ? datos.map(i => `<li><strong>${escapeHtml(i.consecutivo)}</strong> - ${escapeHtml(i.nombre)}</li>`).join('') : '<li>No hay ideas para esta categoría.</li>';
            modal.style.display = 'flex';
        }

        function normalizarBase(valor) {
            if (!valor) return '';
            return valor
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toUpperCase()
                .trim();
        }

        function parseDateValue(valor) {
            if (!valor && valor !== 0) return '';
            const text = String(valor).trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
            // Serial numérico de Excel (ej: 42737 → 2017-01-02)
            const num = Number(text);
            if (!isNaN(num) && num > 1 && num < 2958466 && /^\d+(\.\d+)?$/.test(text)) {
                const base = new Date(Date.UTC(1899, 11, 30));
                const d = new Date(base.getTime() + Math.floor(num) * 86400000);
                if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
            }
            // DD/MM/YYYY
            const slashMatch = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (slashMatch) {
                const d = new Date(Date.UTC(parseInt(slashMatch[3]), parseInt(slashMatch[2]) - 1, parseInt(slashMatch[1])));
                if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
            }
            const date = new Date(text);
            if (!isNaN(date.getTime())) return date.toISOString().slice(0, 10);
            return '';
        }

        function normalizarArea(valor) {
            const llave = normalizarBase(valor);
            return areaEquivalencias[llave] || (valor ? valor.trim() : '');
        }

        function normalizarTipoIdea(valor) {
            const llave = normalizarBase(valor);
            return tipoIdeaEquivalencias[llave] || '';
        }

        function normalizarStatus(valor) {
            const llave = normalizarBase(valor);
            return statusEquivalencias[llave] || (valor ? valor.trim() : '');
        }

        function normalizarIdeaDesarrollo(valor) {
            if (!valor) return '';
            const trimmed = valor.toString().trim().toUpperCase();
            if (trimmed.includes('DESARROLLO') || trimmed.includes('FEED BACK') || trimmed.includes('IMPLEMENTADA')) {
                return 'EN DESARROLLO';
            }
            return trimmed;
        }

        function normalizarPremiacion(valor) {
            if (!valor) return '';
            const trimmed = valor.toString().trim().toUpperCase();
            if (trimmed.includes('PREMIADA') || trimmed.includes('PREMIACION')) {
                return 'PREMIADA';
            }
            if (trimmed.includes('PENDIENTE')) {
                return 'PENDIENTE';
            }
            return trimmed;
        }

        function obtenerTiposDesdeMejora(cadena) {
            if (!cadena) return [];
            const items = Array.isArray(cadena) ? cadena : cadena.toString().split(/[;,]/);
            return items
                .map(item => tipoMejoraEquivalencias[normalizarBase(item)] || '')
                .filter(Boolean);
        }

        function obtenerTiposIdea(cadena, fallbackMejora) {
            let lista = [];
            if (Array.isArray(cadena)) {
                lista = cadena
                    .map(item => normalizarTipoIdea(item))
                    .filter(Boolean);
            } else if (cadena) {
                lista = cadena
                    .toString()
                    .split(/[;,]/)
                    .map(item => normalizarTipoIdea(item))
                    .filter(Boolean);
            }
            if (!lista.length && fallbackMejora) {
                lista = obtenerTiposDesdeMejora(fallbackMejora);
            }
            if (!lista.length) {
                lista = ['Sin clasificar'];
            }
            return lista;
        }

        function mapearEncuestasDesdeFirebase(rawData) {
            if (!rawData) return [];
            return Object.keys(rawData).map(key => {
                const item = rawData[key] || {};
                const areaRaw = item.area || item.Area || item.area_real || item.area_ || '';
                const statusRaw = item.estado || item.Estado || item.estatus || item.Estatus || '';
                const tipoIdeaRaw = item.tipo_idea || item.tipoIdea || item.TipoIdea || item.tipo_mejora || '';
                const tiposNormalizados = obtenerTiposIdea(tipoIdeaRaw, item.tipo_mejora);
                return {
                    ...item,
                    area: normalizarArea(areaRaw),
                    estado: statusRaw || item.estado || item.Estado || item.estatus || item.Estatus || '',
                    tipo_idea: tipoIdeaRaw,
                    tipoIdeaLista: tiposNormalizados
                };
            }).sort((a,b) => {
                const regA = parseInt(a.registro) || 0;
                const regB = parseInt(b.registro) || 0;
                return regB - regA;
            });
        }

        function obtenerPromedioAvance(encuestas) {
            if (!encuestas.length) return 0;
            const total = encuestas.reduce((acc, enc) => acc + (parseInt(enc.porcentaje_avance) || 0), 0);
            return Math.round(total / encuestas.length);
        }

        function renderResumen(encuestas) {
            const totalIdeas = encuestas.length;
            const promedio = obtenerPromedioAvance(encuestas);
            let cerradas = 0, pendientes = 0, estadoEnDesarrollo = 0, viables = 0;
            let ideaEnDesarrolloCount = 0;
            let premiadas = 0, pendientesPremiacion = 0;

            encuestas.forEach(enc => {
                const statusValue = enc.estado || enc.estatus || enc.Estado || enc.Estatus || '';
                const status = normalizarStatus(statusValue);
                const avanceStatus = normalizarIdeaDesarrollo(enc.idea_en_desarrollo || enc.ideaEnDesarrollo || '');
                const premiacionStatus = normalizarPremiacion(enc.premiacion || enc.Premio || enc.premio || '');

                if (status === 'Cerrado') cerradas++;
                if (status === 'Pendiente') pendientes++;
                if (status === 'En desarrollo') estadoEnDesarrollo++;
                if (status === 'Viable') viables++;

                if (avanceStatus === 'EN DESARROLLO') ideaEnDesarrolloCount++;

                if (premiacionStatus === 'PREMIADA') premiadas++;
                if (premiacionStatus === 'PENDIENTE') pendientesPremiacion++;
            });

            const porcentajeEnDesarrollo = totalIdeas ? Math.round((ideaEnDesarrolloCount / totalIdeas) * 100) : 0;

            const now = new Date();
            const currentYearMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            const ideaMesActual = encuestas.filter(e => {
                const fecha = parseDateValue(e.fecha_revision || e.fechaRevision || e.fechaRevision || '');
                return fecha && fecha.startsWith(currentYearMonth);
            }).length;
            const porcentajeMesActual = totalIdeas ? Math.round((ideaMesActual / totalIdeas) * 100) : 0;

            const container = document.getElementById('resumenIndicadores');
            if (container) {
                container.innerHTML = `
                    <div class="overview-card" onclick="mostrarInfoCard('Total de ideas', ${totalIdeas}, 'Cantidad total de ideas registradas en el sistema.'); mostrarDetalleIdeas('total')">
                        <span>Total de ideas</span>
                        <strong>${totalIdeas}</strong>
                        <small>Encuestas capturadas</small>
                    </div>
                    <div class="overview-card" onclick="mostrarInfoCard('Avance general', '${porcentajeEnDesarrollo}%', 'Porcentaje de ideas en estado "en desarrollo".'); mostrarDetalleIdeas('en_desarrollo')">
                        <span>Avance general (idea en desarrollo)</span>
                        <strong>${porcentajeEnDesarrollo}%</strong>
                        <small>${ideaEnDesarrolloCount}/${totalIdeas} en desarrollo</small>
                    </div>
                    <div class="overview-card" onclick="mostrarInfoCard('Ideas en estado pendiente', ${pendientes}, 'Ideas que requieren seguimiento o decisión.'); mostrarDetalleIdeas('pendiente')">
                        <span>Ideas en estado pendiente</span>
                        <strong>${pendientes}</strong>
                        <small>Estado 'Pendiente'</small>
                    </div>
                    <div class="overview-card" onclick="mostrarInfoCard('Ideas premiadas', ${premiadas}, 'Ideas que ya han sido premiadas con resultado final.'); mostrarDetalleIdeas('premiada')">
                        <span>Ideas premiadas</span>
                        <strong>${premiadas}</strong>
                        <small>Premiación 'Premiada'</small>
                    </div>
                    <div class="overview-card" onclick="mostrarInfoCard('Premiación pendiente', ${pendientesPremiacion}, 'Ideas pendientes del proceso de premiación.'); mostrarDetalleIdeas('pendiente_premiacion')">
                        <span>Premiación pendiente</span>
                        <strong>${pendientesPremiacion}</strong>
                        <small>Premiación 'Pendiente'</small>
                    </div>`;
            }
            const avanceNumero = document.getElementById('avanceGeneralNumero');
            const avanceBar = document.getElementById('avanceGeneralBar');
            if (avanceNumero) avanceNumero.textContent = `${ideaMesActual}`;
            if (avanceBar) avanceBar.style.width = `${Math.min(Math.max(porcentajeMesActual, 0), 100)}%`;

            const procesosSelect = document.getElementById('filtroAvanceProceso');
            if (procesosSelect) {
                const procesosUnicos = Array.from(new Set(encuestas.map(e => e.area).filter(Boolean))).sort();
                procesosSelect.innerHTML = '<option value="">Todos los procesos</option>' + procesosUnicos.map(proc => `<option value="${escapeHtml(proc)}">${escapeHtml(proc)}</option>`).join('');
            }
        }

        // Leer encuestas y procesar
        db.ref('encuestas').once('value', function(snapshot) {
            const datos = snapshot.val() || {};
            console.log('Firebase datos raw encuestas:', datos);
            const encuestas = mapearEncuestasDesdeFirebase(datos);
            console.log('encuestas mapeadas:', encuestas);
            window.encuestasCache = encuestas;
            renderResumen(encuestas);
            renderIdeas(encuestas);
            renderAvance(encuestas);
            renderStatus(encuestas);
        });

        // 1. Ideas por Proceso y Tipo de Idea
        function renderIdeas(encuestas) {
            const procesosRender = (() => {
                const orden = [...procesos];
                const setProcesos = new Set(orden);
                encuestas.forEach(enc => {
                    const proc = enc.area || '';
                    if (proc && !setProcesos.has(proc)) {
                        setProcesos.add(proc);
                        orden.push(proc);
                    }
                });
                return orden;
            })();
            const conteo = {};
            procesosRender.forEach(proc => {
                conteo[proc] = {};
                tiposIdea.forEach(tipo => {
                    conteo[proc][tipo] = 0;
                });
            });
            encuestas.forEach(e => {
                const areaRaw = e.area || e.Area || '';
                const proc = areaRaw.toString().trim();
                if (!proc) return;
                if (!conteo[proc]) {
                    conteo[proc] = {};
                    tiposIdea.forEach(tipo => conteo[proc][tipo] = 0);
                }
                const tipos = (Array.isArray(e.tipoIdeaLista) && e.tipoIdeaLista.length)
                    ? e.tipoIdeaLista
                    : obtenerTiposIdea(e.tipo_idea || e.tipoIdea || e.TipoIdea || e.tipo_mejora, e.tipo_mejora);
                tipos.forEach(tipo => {
                    if (conteo[proc][tipo] === undefined) {
                        conteo[proc][tipo] = 0;
                    }
                    conteo[proc][tipo]++;
                });
            });

            // Cálculo de totales por tipo e total global
            const totalesPorTipo = {};
            tiposIdea.forEach(tipo => totalesPorTipo[tipo] = 0);
            let totalGeneral = 0;
            Object.keys(conteo).forEach(proc => {
                tiposIdea.forEach(tipo => {
                    const valor = conteo[proc][tipo] || 0;
                    totalesPorTipo[tipo] += valor;
                    totalGeneral += valor;
                });
            });

            // Render tabla
            let html = '<table><thead><tr><th>Proceso</th>' + tiposIdea.map(t=>`<th>${escapeHtml(t)}</th>`).join('') + '<th>Total</th></tr></thead><tbody>';
            const totalPorProceso = proc => tiposIdea.reduce((acc, tipo) => acc + (conteo[proc]?.[tipo] || 0), 0);
            const procesosOrdenados = procesosRender.slice().sort((a, b) => totalPorProceso(b) - totalPorProceso(a));
            procesosOrdenados.forEach(proc => {
                const procTotal = totalPorProceso(proc);
                html += `<tr><td>${escapeHtml(proc)}</td>` + tiposIdea.map(tipo => {
                    const valor = conteo[proc][tipo] || 0;
                    const clases = valor > 0 ? ' style="background: #c7d2fe; font-weight:700;"' : '';
                    return `<td${clases}>${valor}</td>`;
                }).join('') + `<td style="font-weight:700;">${procTotal}</td></tr>`;
            });
            html += '</tbody><tfoot><tr style="background:#e0e7ff; font-weight:700; color:#1e3a8a; border-top:2px solid #6366f1;">';
            html += '<td>Total</td>' + tiposIdea.map(tipo => `<td>${totalesPorTipo[tipo]}</td>`).join('') + `<td>${totalGeneral}</td>`;
            html += '</tr></tfoot></table>';
            document.getElementById('tablaIdeas').innerHTML = html;
            // Gráfico eliminado; la tabla mantiene el orden por volumen.
        }

        // 2. Avance de cada una y general
        let filtrosAvance = {
            texto: '',
            proceso: '',
            rango: ''
        };



        function renderAvance(encuestas) {
            const conteoEstado = {};
            statusList.forEach(status => conteoEstado[status] = 0);

            encuestas.forEach(e => {
                const status = normalizarStatus(e.estado || e.estatus);
                if (status) {
                    if (conteoEstado[status] === undefined) conteoEstado[status] = 0;
                    conteoEstado[status]++;
                }
            });

            const total = encuestas.length || 1;
            const container = document.getElementById('chartAvanceEstado');
            if (!container) return;

            let html = '<div style="display:grid; gap:10px;">';
            Object.keys(conteoEstado).forEach((label, idx) => {
                const count = conteoEstado[label] || 0;
                const percent = Math.round((count / total) * 100);
                html += `
                    <div style="display:grid; grid-template-columns: 220px 1fr 70px; align-items:center; gap:10px;">
                        <span style="font-weight:700; color:#1f2937;">${escapeHtml(label)}</span>
                        <div style="width:100%; background:#f3f4f6; border-radius:10px; height:20px; overflow:hidden;">
                            <div style="width:${percent}%; background:#f59e0b; height:100%;"></div>
                        </div>
                        <span style="font-weight:700; color:#111; text-align:right;">${count} (${percent}%)</span>
                    </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // 3. Ideas por área
        function renderStatus(encuestas) {
            const conteoArea = {};
            encuestas.forEach(e => {
                const areaRaw = e.area || e.Area || e.area || '';
                const area = areaRaw.toString().trim();
                if (!area) return;
                const normal = escapeHtml(area);
                conteoArea[normal] = (conteoArea[normal] || 0) + 1;
            });

            const areas = Object.keys(conteoArea).sort((a,b)=>conteoArea[b]-conteoArea[a]);
            let html = '<table><thead><tr><th>Area</th><th>Cantidad</th></tr></thead><tbody>';
            areas.forEach(area => {
                html += `<tr><td>${area}</td><td>${conteoArea[area]}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tablaStatus').innerHTML = html;

            const chartStatusDiv = document.getElementById('chartStatus');
            if (chartStatusDiv) {
                const total = areas.reduce((sum, area) => sum + conteoArea[area], 0) || 1;
                let chartHtml = '<div style="display:grid; gap:10px;">';
                areas.forEach(area => {
                    const count = conteoArea[area];
                    const percent = Math.round((count / total) * 100);
                    chartHtml += `
                        <div style="display:grid; grid-template-columns: 180px 1fr 60px; align-items:center; gap:10px;">
                            <span style="white-space: nowrap; font-weight:700;">${area}</span>
                            <div style="width:100%; background:#e2e8f0; border-radius:10px; height:20px; overflow:hidden;">
                                <div style="width:${percent}%; background:#3b82f6; height:100%;"></div>
                            </div>
                            <span style="text-align:right;">${count} (${percent}%)</span>
                        </div>`;
                });
                chartHtml += '</div>';
                chartStatusDiv.innerHTML = chartHtml;
            }
        }
    </script>
